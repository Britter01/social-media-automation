# Ruff configuration — linter + formatter.
# Docs: https://docs.astral.sh/ruff/

line-length = 100
target-version = "py311"

[lint]
# E/W: pycodestyle, F: pyflakes, I: import sorting,
# B: bug-prone patterns, UP: pyupgrade.
select = ["E", "F", "I", "B", "UP", "W"]

[lint.per-file-ignores]
# Tests intentionally poke at private attributes and use broad fakes.
"tests/*" = ["B011"]
